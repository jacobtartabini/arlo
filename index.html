<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Arlo</title>
    <meta name="description" content="By Jacob Tartabini" />
    <meta name="author" content="Tartabini Enterprises LLC" />
    <meta name="theme-color" content="#FFFFFF" />

    <!-- Security Headers -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN" />
    <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    
    <!-- Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://accounts.google.com https://maps.googleapis.com https://cdnjs.cloudflare.com;
      script-src-elem 'self' 'unsafe-inline' https://apis.google.com https://accounts.google.com https://maps.googleapis.com https://cdnjs.cloudflare.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https://*.googleapis.com https://*.gstatic.com;
      media-src 'self' blob:;
      connect-src 'self' https://*.supabase.co wss://*.supabase.co https://apis.google.com https://oauth2.googleapis.com https://www.googleapis.com https://maps.googleapis.com https://maps.gstatic.com https://raspberrypi.tailf531bd.ts.net wss://raspberrypi.tailf531bd.ts.net https://cdn.jsdelivr.net https://*.picovoice.net https://cdnjs.cloudflare.com;
      frame-src 'self' https://accounts.google.com;
      frame-ancestors 'self';
      form-action 'self' https://accounts.google.com;
      base-uri 'self';
      object-src 'none';
      worker-src 'self' blob: https://cdnjs.cloudflare.com;
      child-src 'self' blob:;
    " />

    <!-- PWA Configuration -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Arlo" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon3.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon3.png" />
    <link rel="apple-touch-icon" href="/favicon4.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <meta property="og:title" content="Arlo" />
    <meta property="og:description" content="By Jacob Tartabini" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon4.png" />
  </head>

  <body>
